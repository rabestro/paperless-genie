repos:
  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.6.1
    hooks:
      - id: betterleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # mypy runs as a local hook through uv so pre-commit, `mise run mypy`, and CI
  # all use the same mypy version, configuration, and installed dependencies.
  # The mirrors-mypy hook ran in an isolated env without the project's real
  # dependencies (its additional_dependencies listed stubs for packages this
  # project doesn't even use) and could disagree with CI.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        files: ^(src/.*|pyproject\.toml|uv\.lock)$
