site_name: Paperless Genie
site_description: AI-powered Telegram bot for Paperless-ngx
site_author: Jegors Čemisovs
repo_name: rabestro/paperless-genie
repo_url: https://github.com/rabestro/paperless-genie

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  # Renders ```mermaid fenced blocks as diagrams (Material's built-in support).
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Example Queries: examples.md
  - Architecture: architecture.md
  - Installation & Setup:
      - Creating Telegram Bot: setup/telegram.md
      - Paperless-ngx Token: setup/paperless.md
      - Gemini API Key: setup/gemini.md
      - Configuration: setup/configuration.md
  - Deployment: deployment.md
