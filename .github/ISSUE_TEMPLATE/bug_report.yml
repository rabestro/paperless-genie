name: 🐛 Bug Report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I sent a PDF to the bot and ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Send /start to the bot
        2. Upload a PDF named ...
        3. ...
    validations:
      required: false
  - type: dropdown
    id: deployment
    attributes:
      label: How do you run the bot?
      options:
        - Docker / Docker Compose (GHCR image)
        - systemd / bare Python
        - Local development (mise/uv)
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Bot version
      description: Release tag, image tag, or commit SHA
      placeholder: v0.2.1
    validations:
      required: false
  - type: input
    id: paperless-version
    attributes:
      label: Paperless-ngx version
      placeholder: "2.14"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >
        Paste relevant logs (docker compose logs / journalctl). Redact tokens,
        chat IDs, and anything personal — logs may contain document titles.
      render: text
    validations:
      required: false
