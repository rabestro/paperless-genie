name: Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]

# Require packages write permission to push to GitHub Container Registry (GHCR)
permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Buildx is required for the GitHub Actions cache backend below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse layers across runs so an unchanged main is mostly cache hits.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach SLSA provenance and an SBOM to the image in GHCR.
          provenance: mode=max
          sbom: true
          # Single-platform (linux/amd64): the only deploy target (aurora) is
          # x86_64, so arm64 via QEMU emulation would double build time for no
          # consumer. Add `platforms: linux/amd64,linux/arm64` + a QEMU setup
          # step if an arm host ever enters the picture.
