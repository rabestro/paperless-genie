name: Tag Release

# Phase 2 of the release flow. When a version-bump PR from release.yaml lands
# on main, this tags the new version and creates the GitHub Release. Tag pushes
# are not blocked by the branch ruleset, so GITHUB_TOKEN can create the tag
# directly. Idempotent: it only acts when pyproject.toml's version has no
# matching tag yet, so ordinary pushes to main do nothing. Creating the tag
# triggers publish.yaml (which builds and pushes the image).

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pyproject.toml'

permissions:
  contents: write   # create the tag and the GitHub Release

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need all tags to check whether this version is new

      - name: Tag and release if the version is new
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          tag="v${version}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — nothing to do."
            exit 0
          fi

          echo "Tagging new version ${tag}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "${tag}"

          gh release create "${tag}" \
            --title "Paperless Genie ${tag}" \
            --generate-notes
