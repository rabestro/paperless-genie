name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create tags, commits, and GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history needed to read all tags

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          # Use pyproject.toml as the source of truth for the current version
          current=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version (pyproject.toml): $current"

          IFS='.' read -r major minor patch <<< "$current"

          case "${{ github.event.inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"
          echo "New version: $new_version  →  tag: $new_tag"

          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${new_tag}"         >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Update version in pyproject.toml and uv.lock
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          echo "pyproject.toml after update:"
          grep '^version' pyproject.toml
          uv lock

      - name: Commit version bump
        run: |
          git add pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "No version changes to commit — skipping."
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.tag }}"
            git push origin main
          fi

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # Release notes are generated by GitHub from merged PRs and their labels,
      # categorized per .github/release.yml (which the labeler keeps populated).
      # The previous hand-rolled git-log notes bypassed that config entirely.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Paperless Genie ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          draft: false
          prerelease: false
