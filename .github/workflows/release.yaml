name: Prepare Release

# Phase 1 of the release flow. Because `main` requires a pull request (repo
# ruleset), this workflow does NOT push to main directly. It bumps the version
# on a branch and opens a PR; merging that PR triggers tag-release.yaml, which
# creates the tag and GitHub Release, which in turn triggers publish.yaml.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

permissions:
  contents: write        # push the release branch
  pull-requests: write   # open the version-bump PR

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          # Use pyproject.toml as the source of truth for the current version
          current=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version (pyproject.toml): $current"

          IFS='.' read -r major minor patch <<< "$current"

          case "${{ github.event.inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"
          echo "New version: $new_version  →  tag: $new_tag"

          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${new_tag}"         >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Update version in pyproject.toml and uv.lock
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          echo "pyproject.toml after update:"
          grep '^version' pyproject.toml
          uv lock

      - name: Open version-bump pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          branch="release/${tag}"

          if git diff --quiet; then
            echo "No version changes — nothing to release."
            exit 0
          fi

          git switch -c "${branch}"
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to ${tag}"
          git push --force-with-lease origin "${branch}"

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "chore: release ${tag}" \
            --body "Automated version bump to \`${version}\`. Merging this PR tags **${tag}** and publishes the release."
