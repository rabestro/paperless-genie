name: Quality Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Both jobs only read the checked-out code; nothing here needs write scope.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Check formatting with Ruff
        run: uv run ruff format src tests --check

      - name: Lint with Ruff
        run: uv run ruff check src tests

      - name: Type check with mypy
        run: uv run mypy src

      - name: Run tests with pytest
        run: uv run pytest --cov=paperless_genie --cov-report=term-missing

  # Enforce the full pre-commit suite centrally: local hooks can be skipped
  # (or never installed), and this is the only place the betterleaks secret
  # scan runs on every PR regardless of the contributor's setup.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.14"
          enable-cache: true

      # The local mypy hook runs `uv run mypy src` and needs the project env.
      - name: Install dependencies
        run: uv sync --locked

      - name: Cache pre-commit environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          # Fall back to the newest prior cache so a config change rebuilds only
          # the changed hooks instead of every environment from scratch.
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit on all files
        run: uv run pre-commit run --all-files --show-diff-on-failure
