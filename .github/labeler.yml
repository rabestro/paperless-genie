# Automated PR labeling rules based on modified files and branch names.
# Domain labels map to their modules (post-#50–#53 decomposition of bot.py),
# so each label carries signal instead of firing on every code PR.

# 💬 Telegram bot handlers, UX, and per-user chat state
telegram:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/paperless_genie/bot.py'
          - 'src/paperless_genie/conversation.py'

# 🤖 AI agent behavior: prompts, MCP wiring, and the run loop
agent:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/paperless_genie/agent.py'

# 🏛️ Paperless-ngx REST client and API models
paperless:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/paperless_genie/paperless.py'

# 🧪 Test-only pull requests: EVERY changed file is a test.
# Deliberately not "any test file changed" — tests accompany nearly every PR,
# which made this label carry no signal.
testing:
  - changed-files:
      - all-globs-to-all-files:
          - 'tests/**'

# 📚 Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'
          - 'mkdocs.yaml'

# ⚙️ CI/CD workflows and repo automation config.
# pyproject.toml/uv.lock are deliberately NOT here: dependency bumps already
# get `dependencies` from Dependabot, and lint/build config is not CI.
ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/labeler.yml'
          - '.github/release.yml'
          - '.github/dependabot.yaml'
          - '.pre-commit-config.yaml'
          - '.coderabbit.yaml'

# 📦 Infrastructure & Docker
infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose.yml'

# Type labels based on branch naming conventions
enhancement:
  - head-branch: ['^feat/', '^feature/']
bug:
  - head-branch: ['^bug/', '^fix/', '^bugfix/']
refactoring:
  - head-branch: ['^refactor/']
performance:
  - head-branch: ['^perf/']
